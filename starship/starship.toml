# ══════════════════════════════════════════════════════════════════════════════
#  STARSHIP PROMPT  ·  ULTIMATE EDITION
#  Requires: Nerd Font v3+ (JetBrainsMono, FiraCode, CaskaydiaCove, etc.)
# ══════════════════════════════════════════════════════════════════════════════

"$schema" = "https://starship.rs/config-schema.json"

scan_timeout = 10
command_timeout = 500
follow_symlinks = false
add_newline = true

# ┌─────────────────────────────────────────────────────────────────────────────
# │ PROMPT LAYOUT
# │
# │ Line 1:  ╭─ [] [ dir ] [  branch ]  +2 ~1 ⇡1 ────────  󱑂 3s
# │ Line 2:  ╰─ ❯                                    v20   3.12  14:30
# └─────────────────────────────────────────────────────────────────────────────

format = """
[╭─](dimmed overlay0)\
[](sapphire)\
$os\
[](fg:sapphire bg:surface0)\
$directory\
[](fg:surface0)\
$git_branch\
$git_status\
$git_state\
$fill\
$cmd_duration\
$status\
$jobs\
$line_break\
[╰─](dimmed overlay0)\
$character\
"""

right_format = """
$sudo\
$container\
$kubernetes\
$docker_context\
$terraform\
$aws\
$gcloud\
$azure\
$c\
$cmake\
$rust\
$golang\
$nodejs\
$bun\
$deno\
$python\
$conda\
$java\
$kotlin\
$gradle\
$php\
$ruby\
$lua\
$swift\
$dart\
$zig\
$elixir\
$haskell\
$scala\
$perl\
$julia\
$nix_shell\
$package\
$memory_usage\
$battery\
$time\
"""

palette = "kanagawa"

# ── OS ────────────────────────────────────────────────────────────────────────

[os]
disabled = false
style = "bg:sapphire fg:crust"
format = "[$symbol ](bg:sapphire fg:crust)"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = ""
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
NixOS = ""
FreeBSD = ""
Unknown = ""

# ── DIRECTORY ─────────────────────────────────────────────────────────────────

[directory]
style = "bg:surface0 fg:sapphire"
format = "[ $path ]($style)[$read_only]($read_only_style)"
read_only = " 󰌾"
read_only_style = "bg:surface0 fg:red"
truncation_length = 4
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = "󰿎 "
"Developer" = "󰲋 "
"Desktop" = "󰇄 "
"Projects" = " "
"Others" = " "

# ── USER / HOST (enable for SSH) ─────────────────────────────────────────────

[username]
disabled = true
show_always = false
style_user = "bg:sapphire fg:crust"
style_root = "bg:red fg:crust"
format = "[$user ]($style)"

[hostname]
disabled = true
ssh_only = true
style = "bg:sapphire fg:crust"
format = "[@$hostname ]($style)"

# ── CORE ──────────────────────────────────────────────────────────────────────

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"
vimcmd_replace_one_symbol = "[❮](bold mauve)"
vimcmd_replace_symbol = "[❮](bold mauve)"
vimcmd_visual_symbol = "[❮](bold sky)"

[fill]
symbol = "─"
style = "dimmed overlay0"

# ══════════════════════════════════════════════════════════════════════════════
#  GIT
# ══════════════════════════════════════════════════════════════════════════════

[git_branch]
symbol = " "
style = "bg:mauve fg:crust"
format = " [](mauve)[$symbol $branch(:$remote_branch) ](bg:mauve fg:crust)[](mauve)"
truncation_length = 30
truncation_symbol = "…"

[git_status]
format = " $staged$modified$untracked$renamed$deleted$stashed$conflicted$ahead_behind"
staged     = "[+${count} ](green)"
modified   = "[~${count} ](yellow)"
untracked  = "[?${count} ](sapphire)"
renamed    = "[»${count} ](blue)"
deleted    = "[-${count} ](red)"
stashed    = "[≡${count} ](lavender)"
conflicted = "[✖${count} ](bold red)"
ahead      = "[⇡${count} ](teal)"
behind     = "[⇣${count} ](peach)"
diverged   = "[⇕⇡${ahead_count}⇣${behind_count} ](mauve)"

[git_state]
format = " [](yellow)[ $state ($progress_current/$progress_total) ](bg:yellow fg:crust)[](yellow)"
rebase = "󰜘 REBASE"
merge = " MERGE"
revert = "󰜘 REVERT"
cherry_pick = " PICK"
bisect = " BISECT"
am = " AM"
am_or_rebase = "󰜘 AM/REBASE"

[git_metrics]
disabled = true
added_style = "green"
deleted_style = "red"
format = " [+$added]($added_style)/[-$deleted]($deleted_style)"

# ── CUSTOM GIT MODULES ───────────────────────────────────────────────────────

[custom.giturl]
disabled = true
description = "Display symbol for remote Git server (disabled — icon baked into git_branch)"
command = "echo ''"
when = false
format = " $output"
require_repo = true

[custom.git_worktree]
disabled = true
description = "Show indicator when inside a git worktree (disabled — saves ~26ms fork)"
command = "echo ''"
when = false
format = " ([$output ](bold green))"
style = "bold green"
require_repo = true

# ══════════════════════════════════════════════════════════════════════════════
#  COMMAND INFO
# ══════════════════════════════════════════════════════════════════════════════

[cmd_duration]
min_time = 500
format = " [](yellow)[ 󱑂 $duration ](bg:yellow fg:crust)[](yellow)"
show_milliseconds = false
min_time_to_notify = 45_000

[status]
disabled = false
format = " [](red)[ 󰅗 $status ](bg:red fg:crust)[](red)"
map_symbol = true

[jobs]
disabled = false
symbol = "󰜎"
format = " [$symbol$number]($style)"
style = "bold blue"

[sudo]
disabled = true
symbol = "󰞀 "
format = "[$symbol]($style)"
style = "bold red"

[container]
disabled = false
symbol = "󰏖 "
format = "[$symbol$name]($style) "
style = "dimmed red"

# ══════════════════════════════════════════════════════════════════════════════
#  CLOUD & INFRASTRUCTURE
# ══════════════════════════════════════════════════════════════════════════════

[kubernetes]
disabled = true
symbol = "󱃾"
format = " [](blue)[ $symbol $context(:$namespace) ](bg:blue fg:crust)[](blue)"

[docker_context]
symbol = "󰡨"
format = " [](sky)[ $symbol $context ](bg:sky fg:crust)[](sky)"
only_with_files = true

[terraform]
symbol = "󱁢"
format = " [$symbol $version]($style)"
style = "mauve"

[aws]
symbol = ""
format = " [$symbol $profile($region)]($style)"
style = "peach"
disabled = true

[gcloud]
symbol = "󱇶"
format = " [$symbol $project($region)]($style)"
style = "blue"
disabled = true

[azure]
symbol = "󰠅"
format = " [$symbol $subscription]($style)"
style = "blue"
disabled = true

# ══════════════════════════════════════════════════════════════════════════════
#  LANGUAGES
# ══════════════════════════════════════════════════════════════════════════════

[c]
symbol = ""
format = " [$symbol $version]($style)"
style = "blue"

[cmake]
symbol = "󰔷"
format = " [$symbol $version]($style)"
style = "blue"

[rust]
symbol = ""
format = " [$symbol $version]($style)"
style = "peach"

[golang]
symbol = ""
format = " [$symbol $version]($style)"
style = "sky"
detect_files = ["go.mod", "go.sum"]

[nodejs]
symbol = ""
format = " [$symbol $version]($style)"
style = "green"

[bun]
symbol = "🍞"
format = " [$symbol $version]($style)"
style = "yellow"

[deno]
symbol = "🦕"
format = " [$symbol $version]($style)"
style = "green"

[python]
symbol = ""
format = " [$symbol $version( $virtualenv)]($style)"
style = "yellow"

[conda]
symbol = "󰔐"
format = " [$symbol $environment]($style)"
style = "green"
ignore_base = true

[java]
symbol = ""
format = " [$symbol $version]($style)"
style = "red"

[kotlin]
symbol = ""
format = " [$symbol $version]($style)"
style = "mauve"

[gradle]
symbol = "󰏗"
format = " [$symbol $version]($style)"
style = "blue"

[php]
symbol = ""
format = " [$symbol $version]($style)"
style = "lavender"

[ruby]
symbol = ""
format = " [$symbol $version]($style)"
style = "red"

[lua]
symbol = ""
format = " [$symbol $version]($style)"
style = "blue"

[swift]
symbol = "󰛥"
format = " [$symbol $version]($style)"
style = "peach"

[dart]
symbol = ""
format = " [$symbol $version]($style)"
style = "sky"

[zig]
symbol = ""
format = " [$symbol $version]($style)"
style = "yellow"

[elixir]
symbol = ""
format = " [$symbol $version]($style)"
style = "mauve"

[haskell]
symbol = ""
format = " [$symbol $version]($style)"
style = "mauve"

[scala]
symbol = ""
format = " [$symbol $version]($style)"
style = "red"

[perl]
symbol = ""
format = " [$symbol $version]($style)"
style = "sky"

[julia]
symbol = ""
format = " [$symbol $version]($style)"
style = "mauve"

[nix_shell]
symbol = ""
format = " [$symbol $state( $name)]($style)"
style = "blue"

# ══════════════════════════════════════════════════════════════════════════════
#  SYSTEM
# ══════════════════════════════════════════════════════════════════════════════

[package]
disabled = false
symbol = "󰏗"
format = " [$symbol $version]($style)"
style = "peach"

[memory_usage]
disabled = true
threshold = 75
symbol = "󰍛 "
format = " [$symbol$ram]($style)"
style = "dimmed yellow"

[battery]
format = " [$symbol$percentage]($style)"

[[battery.display]]
threshold = 20
style = "bold red"
charging_symbol = "󰢟 "
discharging_symbol = "󰂃 "

[[battery.display]]
threshold = 50
style = "yellow"
charging_symbol = "󰂄 "
discharging_symbol = "󰁾 "

[[battery.display]]
threshold = 80
style = "green"
charging_symbol = "󱊦 "
discharging_symbol = "󰂁 "

[time]
disabled = false
time_format = "%H:%M"
style = "dimmed text"
format = " [󰥔 $time]($style)"

# ── DISABLED ──────────────────────────────────────────────────────────────────

[shell]
disabled = true

[shlvl]
disabled = true

[localip]
disabled = true

[singularity]
disabled = true

[vcsh]
disabled = true

