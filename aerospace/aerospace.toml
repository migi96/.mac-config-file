# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=0'
]


after-login-command = []
after-startup-command = [
    # JankyBorders has a built-in detection of already running process,
    # so it won't be run twice on AeroSpace restart
    'exec-and-forget /opt/homebrew/opt/sketchybar/bin/sketchybar',
]

# Focus behaviors
on-focus-changed = [
  "move-mouse window-lazy-center",
  "exec-and-forget ~/scripts/play_workspace_sound.sh",
  "exec-and-forget curl http://localhost:7776/aerospace/spaces/refresh"
]

# exec-on-workspace-change = [
#   "/bin/bash", "-c",
#   '/opt/homebrew/opt/sketchybar/bin/sketchybar --trigger aerospace_workspace_change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE && ~/scripts/play_workspace_sound.sh AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
#   "/bin/bash", "-c",
#   "curl http://localhost:7776/aerospace/spaces/refresh"
# ]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# accordion-padding = 20
accordion-padding = 300

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor → horizontal, tall monitor → vertical
default-root-container-orientation = 'auto'

automatically-unhide-macos-hidden-apps = false
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Assign workspaces 1–4 exclusively to LG ULTRAGEAR
[workspace-to-monitor-force-assignment]
1 = "LG ULTRAGEAR"
2 = "LG ULTRAGEAR"
3 = "LG ULTRAGEAR"
4 = "LG ULTRAGEAR"
5 = "LG ULTRAGEAR"

[gaps]
inner.horizontal = 20
inner.vertical =   20
outer.left =       5
outer.bottom =     3
outer.top =        60
outer.right =      5


# inner.horizontal = 20
# inner.vertical = 20
# outer.top = [{ monitor."main" = 5 }, 40]
# outer.bottom = 17
#
# Binding mode declarations
[mode.main.binding]
# Workspace shortcuts on LG ULTRAGEAR:
#   cmd-s → WS 1
#   cmd-d → WS 2
#   cmd-f → WS 3
#   cmd-g → WS 4
 cmd-alt-shift-s = "workspace 1"
 cmd-alt-shift-d = "workspace 2"
 cmd-alt-shift-f = "workspace 3"
 cmd-alt-shift-g = "workspace 4"
 cmd-alt-shift-b = "workspace 5"
 cmd-alt-shift-u = "workspace 6"
 cmd-alt-shift-w = "workspace 7"
 cmd-alt-shift-y = "workspace 8"
 cmd-alt-shift-a = "workspace 9"

# cmd-b = "workspace 5"


cmd-slash = "layout tiles horizontal vertical"
cmd-comma = "layout accordion horizontal vertical"

# Focus movement
cmd-h = "focus left"
cmd-j = "focus down"
cmd-k = "focus up"
cmd-l = "focus right"

# Move windows
cmd-shift-h = "move left"
cmd-shift-j = "move down"
cmd-shift-k = "move up"
cmd-shift-l = "move right"

# Resize windows
cmd-shift-minus = "resize smart -50"
cmd-shift-equal = "resize smart +50"

# Fullscreen toggle
cmd-shift-a = "fullscreen"

# Workspace back and forth
cmd-5 = "workspace-back-and-forth"
cmd-b = "workspace-back-and-forth"

# Service binding mode declaration
[mode.service.binding]
esc = ["reload-config", "mode main"]
r = ["flatten-workspace-tree", "mode main"]
o = ["layout floating tiling", "mode main"]

cmd-shift-h = ["join-with left",  "mode main"]
cmd-shift-j = ["join-with down",  "mode main"]
cmd-shift-k = ["join-with up",    "mode main"]
cmd-shift-l = ["join-with right", "mode main"]

