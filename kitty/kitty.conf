# Font settings
# ProFontIIxNerdFont-Regular
font_family                ProFontIIxNerdFont-Regular
# BigBlueTerm437NerdFont
bold_font                  auto
italic_font                auto
bold_italic_font           auto
# font_size                  26
font_size                  20
# Cursor
cursor_shape_unfocused     hollow
cursor_trail               10
cursor_trail_start_threshold 3
# Colors
foreground                 #dddddd
background                 #1a1a1a
# Background image
background_image           /Users/migbyte/migbyte_two.png
background_image_layout    scaled
background_tint            0.2
# Selection colors
selection_foreground       none
selection_background       none
# Dynamic background opacity
dynamic_background_opacity no
# macOS: Treat Option key as Alt (required for ctrl+alt keybindings)
macos_option_as_alt          yes
# Blur (Optional: Enable for macOS or KDE)
background_blur            25
# Window opacity (global)
background_opacity         0.9
# Transparent backgrounds for specific palette entries
# here, any cell using palette color15 will be rendered at 80% opacity
 # transparent_background_colors  color15@0.8
# Color table
color0   #000000
color8   #767676
color1   #cc0403
color9   #f2201f
color2   #19cb00
color10  #23fd00
color3   #cecb00
color11  #ffff00
color4   #0d73cc
color12  #1a8fff
color5   #cb1ed1
color13  #fd28ff
color6   #0dcdcd
color14  #14ffff
color7   #dddddd
color15  #ffffff

# ─────────────────────────────────────────────
# Remote control (required for fzf tab switcher)
# ─────────────────────────────────────────────
allow_remote_control       yes
listen_on                  unix:/tmp/kitty

# nchat: Map Cmd+J to Alt+J (sends Esc+j) for goto chat
map cmd+j send_text all \x1bj

# ─────────────────────────────────────────────
# Sessions / Tabs — Colemak-DH Home Row
# Home row: a r s t | n e i o  →  tabs 1–8
# ─────────────────────────────────────────────

# ctrl+<key>        → go to tab N
map ctrl+a          goto_tab 1
map ctrl+alt+shift+z          goto_tab 2
map ctrl+s          goto_tab 3
map ctrl+q          goto_tab 4
map f14          goto_tab 5
map f4          goto_tab 6
map ctr+f1          goto_tab 7
map f17          goto_tab 8

# ctrl+shift+<key>  → move current tab to position N
map ctrl+shift+a    move_tab_forward
map ctrl+shift+r    move_tab_forward
map ctrl+shift+s    move_tab_backward
map ctrl+shift+t    move_tab_backward
map ctrl+shift+n    goto_tab 5
map ctrl+shift+e    goto_tab 6
map ctrl+shift+i    goto_tab 7
map ctrl+shift+o    goto_tab 8

# ctrl+alt+<key>    → tab management actions
map ctrl+alt+a      new_tab
map ctrl+alt+r      new_tab_with_cwd
map ctrl+alt+s      remote_control launch --type=overlay --stdin-source=none /Users/migbyte/.config/kitty/rename_tab.sh
map ctrl+alt+t      detach_tab
map ctrl+alt+n      next_tab
map ctrl+alt+e      previous_tab
map ctrl+alt+i      move_tab_forward
map ctrl+alt+o      close_tab

# ─────────────────────────────────────────────
# FZF — Session & Tab Search
# ─────────────────────────────────────────────

# ctrl+alt+f  → fzf fuzzy search across open tabs (switch focus)
map ctrl+alt+f remote_control launch --type=overlay --stdin-source=none /Users/migbyte/.config/kitty/fzf_tab.sh

# ─────────────────────────────────────────────
# Session Save & Restore
# ─────────────────────────────────────────────

# ctrl+alt+w       → save ALL sessions (all tabs/panes/scrollback)
map ctrl+alt+f8 remote_control launch --type=overlay --stdin-source=none /Users/migbyte/.config/kitty/save_all_sessions.sh

# ctrl+alt+shift+w → save CURRENT tab only
map ctrl+alt+shift+f9 remote_control launch --type=overlay --stdin-source=none /Users/migbyte/.config/kitty/save_current_session.sh

# ctrl+alt+l       → restore last full save (most recent all_* snapshot)
map ctrl+alt+f4 remote_control launch --type=overlay --stdin-source=none /Users/migbyte/.config/kitty/restore_last_session.sh

# ctrl+alt+p       → fzf pick a saved session to restore into current instance
map ctrl+alt+f3 remote_control launch --type=overlay --stdin-source=none /Users/migbyte/.config/kitty/fzf_session.sh

# ─────────────────────────────────────────────
# Reload config (no restart needed)
# ─────────────────────────────────────────────

# ctrl+shift+f5  → reload kitty.conf live
map ctrl+shift+f5 load_config_file

# ─────────────────────────────────────────────
# Last command output → nvim
# ─────────────────────────────────────────────

# F17 → capture last command output and open in nvim
map f1 launch --type=overlay --stdin-source=none /Users/migbyte/.config/kitty/kitty_commands.sh
