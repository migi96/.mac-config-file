# ===============================================
# GENERAL SETTINGS
# ===============================================
set -g focus-events on
set -g status-interval 5
set-option -g default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',xterm-256color:RGB'
set-option -ga terminal-overrides ',xterm-kitty:RGB'
set -g mouse on
setw -g mode-keys vi
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Source reset config
source-file '/Users/migbyte/.config/tmux/tmux.reset.conf'

# ===============================================
# PREFIX KEY
# ===============================================
set -g prefix ^N
unbind C-b

# ===============================================
# KEY BINDINGS - GENERAL
# ===============================================
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Quick access to copy mode
bind v copy-mode
bind -n M-v copy-mode  # Alt+v for quick access without prefix

# Open entire scrollback in nvim with ANSI color rendering
# -e = capture escape sequences (colors), -p = print to stdout
# -S - = from start of history, -E - = to end of visible area
# Opens in nvim terminal buffer so ANSI colors render correctly
# Press <C-\><C-n> to enter normal mode for search/yank/scroll
bind e run-shell 'tmux capture-pane -e -p -S - -E - > /tmp/tmux-scrollback' \; new-window -n '[copy]' 'nvim -c "set nonumber norelativenumber scrolloff=0 signcolumn=no" -c "term cat /tmp/tmux-scrollback" -c "stopinsert" -c "normal G"'

# ===============================================
# WINDOW MANAGEMENT
# ===============================================
# Create new window
bind c new-window -c "#{pane_current_path}"
bind -n M-c new-window -c "#{pane_current_path}"  # Alt+c

# Navigate windows
bind -n M-h previous-window  # Alt+h
bind -n M-l next-window      # Alt+l
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# jump back and forth between the current and the last active window
bind -n M-Tab last-window

# Move windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Kill window
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# ===============================================
# PANE MANAGEMENT
# ===============================================
# Split panes (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind "\\" split-window -fh -c "#{pane_current_path}"  # Full width
bind "_" split-window -fv -c "#{pane_current_path}"   # Full height

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind -r "{" swap-pane -U
bind -r "}" swap-pane -D

# Break pane into new window
bind b break-pane -d

# Join pane from another window
bind j choose-window 'join-pane -h -s "%%"'
bind @ choose-window 'join-pane -s "%%"'

# Kill pane
bind x kill-pane

# Toggle pane zoom
bind f resize-pane -Z

# Mark/unmark pane
bind m select-pane -m
bind M select-pane -M

# ===============================================
# COPY MODE (VI BINDINGS)
# ===============================================
# Enter copy mode with prefix + [
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi r send -X rectangle-toggle
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi Y send -X copy-end-of-line
bind-key -T copy-mode-vi Escape send -X cancel

# Copy mode with vim search
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# Mouse support in copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ===============================================
# SESSION MANAGEMENT
# ===============================================
# Quick session switching
bind C-j switch-client -n
bind C-k switch-client -p

# Create new session
bind C-c new-session

# Rename session
bind R command-prompt -I "#S" "rename-session '%%'"

# Kill session
bind Q confirm-before -p "kill-session #S? (y/n)" kill-session

# ===============================================
# MISCELLANEOUS
# ===============================================
# Clear screen and history
bind C-l send-keys 'C-l' \; clear-history

# Toggle status bar
bind S set-option -g status

# Synchronize panes
bind s set-window-option synchronize-panes\; display "Sync #{?pane_synchronized,ON,OFF}"

# Show pane numbers for longer
bind q display-panes -d 4000

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ===============================================
# PLUGINS CONFIGURATION
# ===============================================
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/catppuccin-tmux'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# Floax plugin
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

# Sessionx plugin
set -g @sessionx-bind 'o'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '/Users/omerxx/dotfiles'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @sessionx-legacy-fzf-support '1'

# Continuum & Resurrect
set -g @continuum-restore 'off'
set -g @resurrect-strategy-nvim 'session'

# Catppuccin theme
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
set -g @catppuccin_date_time_text "%H:%M"

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session
bind -N "switch to root session (via sesh) " 9 run-shell "sesh connect --root $(pwd)"
# ===============================================
# INITIALIZE TPM (keep at bottom)
# ===============================================
run '~/.tmux/plugins/tpm/tpm'



