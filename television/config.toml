# ════════════════════════════════════════════════════════════════════════════════
#  TELEVISION CONFIG  ·  migbyte
#  ~/.config/television/config.toml
# ════════════════════════════════════════════════════════════════════════════════

# ── General ──────────────────────────────────────────────────────────────────
tick_rate = 50
default_channel = "files"
shell = "zsh"
history_size = 500
global_history = false

# ── UI ───────────────────────────────────────────────────────────────────────
[ui]
ui_scale = 90
orientation = "landscape"
theme = "kanagawa"

# ── Input Bar ────────────────────────────────────────────────────────────────
[ui.input_bar]
position = "top"
prompt = " "
border_type = "rounded"

# ── Status Bar ───────────────────────────────────────────────────────────────
[ui.status_bar]
# Powerline bubble separators (matches Starship aesthetic)
separator_open = ""
separator_close = ""
hidden = false

# ── Results Panel ────────────────────────────────────────────────────────────
[ui.results_panel]
border_type = "rounded"

# ── Preview Panel ────────────────────────────────────────────────────────────
[ui.preview_panel]
size = 55
scrollbar = true
border_type = "rounded"
hidden = false

# ── Help Panel ───────────────────────────────────────────────────────────────
[ui.help_panel]
show_categories = true
hidden = true

# ── Remote Control ───────────────────────────────────────────────────────────
[ui.remote_control]
show_channel_descriptions = true
sort_alphabetically = true

# ══════════════════════════════════════════════════════════════════════════════
#  KEYBINDINGS
#  Vim-centric with Emacs fallbacks for input editing
# ══════════════════════════════════════════════════════════════════════════════
[keybindings]

# ── Quit ─────────────────────────────────────────────────────────────────────
esc = "quit"
ctrl-c = "quit"

# ── Navigation (Vim j/k + arrows) ───────────────────────────────────────────
down = "select_next_entry"
ctrl-n = "select_next_entry"
ctrl-j = "select_next_entry"
up = "select_prev_entry"
ctrl-p = "select_prev_entry"
ctrl-k = "select_prev_entry"

# ── History ──────────────────────────────────────────────────────────────────
ctrl-up = "select_prev_history"
ctrl-down = "select_next_history"

# ── Selection ────────────────────────────────────────────────────────────────
tab = "toggle_selection_down"
backtab = "toggle_selection_up"
enter = "confirm_selection"

# ── Preview ──────────────────────────────────────────────────────────────────
pagedown = "scroll_preview_half_page_down"
pageup = "scroll_preview_half_page_up"
ctrl-d = "scroll_preview_half_page_down"
ctrl-b = "scroll_preview_half_page_up"
ctrl-f = "cycle_previews"

# ── Data / Clipboard ────────────────────────────────────────────────────────
ctrl-y = "copy_entry_to_clipboard"
ctrl-r = "reload_source"
ctrl-s = "cycle_sources"

# ── UI Toggles ───────────────────────────────────────────────────────────────
ctrl-t = "toggle_remote_control"
ctrl-x = "toggle_action_picker"
ctrl-o = "toggle_preview"
ctrl-h = "toggle_help"
f12 = "toggle_status_bar"
ctrl-l = "toggle_layout"

# ── Input Editing ────────────────────────────────────────────────────────────
backspace = "delete_prev_char"
ctrl-w = "delete_prev_word"
ctrl-u = "delete_line"
delete = "delete_next_char"
left = "go_to_prev_char"
right = "go_to_next_char"
home = "go_to_input_start"
ctrl-a = "go_to_input_start"
end = "go_to_input_end"
ctrl-e = "go_to_input_end"

# ══════════════════════════════════════════════════════════════════════════════
#  SHELL INTEGRATION
#  Smart autocomplete: Ctrl+T   |   History: Ctrl+R
# ══════════════════════════════════════════════════════════════════════════════
[shell_integration]
fallback_channel = "files"

[shell_integration.channel_triggers]
# ── Editor / File Ops / PHP ──────────────────────────────────────────────────
"files" = [
  "cat", "less", "head", "tail", "bat",
  "cp", "mv", "rm", "touch",
  "chmod", "chown", "ln",
  "tar", "zip", "unzip", "gzip", "gunzip", "xz",
  "php", "php artisan", "composer",
]

# ── Directory Nav ────────────────────────────────────────────────────────────
"dirs" = ["cd", "ls", "rmdir", "z"]

# ── Environment ──────────────────────────────────────────────────────────────
"alias" = ["alias", "unalias"]
"env" = ["export", "unset"]

# ── Git ──────────────────────────────────────────────────────────────────────
"git-diff" = ["git add", "git restore"]
"git-branch" = [
  "git checkout", "git branch", "git merge",
  "git rebase", "git pull", "git push",
  "git switch",
]
"git-log" = ["git log", "git show", "git revert", "git cherry-pick"]
"git-stash" = ["git stash"]
"git-tags" = ["git tag"]

# ── Editors open repos ──────────────────────────────────────────────────────
"git-repos" = ["nvim", "nv", "code", "hx", "git clone"]

# ── Docker ───────────────────────────────────────────────────────────────────
"docker-images" = ["docker run", "docker rmi"]
"docker-containers" = ["docker exec", "docker logs", "docker stop", "docker rm"]

# ── Brew (macOS) ─────────────────────────────────────────────────────────────
"brew-packages" = ["brew uninstall", "brew info", "brew upgrade"]

# ── SSH ──────────────────────────────────────────────────────────────────────
"ssh-hosts" = ["ssh", "scp", "rsync"]

# ── Man pages ────────────────────────────────────────────────────────────────
"man-pages" = ["man"]

# ── Tmux ─────────────────────────────────────────────────────────────────────
"tmux-sessions" = ["tmux attach", "tmux switch"]

# ── Processes ────────────────────────────────────────────────────────────────
"procs" = ["kill", "killall"]

[shell_integration.keybindings]
smart_autocomplete = "ctrl-t"
command_history = "ctrl-r"
